<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>card-transform</title>
</head>

<style>
    body {
        background: #000;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 50vh;

    }

    .card {
        height: 250px;
        width: 250px;
        transition: .6s;
        position: relative;
        border-radius: 50%;
        border: 5px solid #9898f634;


    }

    .circle {
        position: absolute;
        height: 100%;
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: wheat;
        font-size: 1.1rem;
        text-transform: capitalize;
        transition: .5s;

    }

    .product {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: wheat;
        inset: 0;
        text-transform: capitalize;
        position: absolute;
        inset: 0;
        text-align: center;
        width: 100%;
        height: 100%;
        margin: 5px;
        transition: .5s;
        transform: scale(0);


    }

    .product img {
        height: 250px;
        width: 250px;
        position: absolute;
        top: -60px;
        left: -50px;
        transition: .6s;
    }

    .product button {
        padding: 15px;
        color: orange;
        background-color: white;
        border-radius: 20px;
        font-size: 1.1rem;
        transition: .3s;
    }

    .product button:hover {
        background-color: #9898f634;
    }

    .card:hover {
        width: 500px;
        border-radius: 20px;
        background-color: #040467;
        border: 5px solid #3a3af634;
        box-shadow: 0px 15px 20px #040467;

    }

    .card:hover .circle {
        transform: scale(0);
        transition-delay: .3s;


    }

    .card:hover .product {
        transform: scale(1);
        transition-delay: .3s;
    }

    .card:hover .product img {
        transform: rotate(360deg);
        transition-delay: .3s;
    }
</style>

<body>

    <div class="card">
        <div class="circle">
            <h1>our top sales</h1>
        </div>
        <div class="product">
            <img src="https://static.vecteezy.com/system/resources/previews/027/765/037/non_2x/red-sale-label-on-a-transparent-background-free-png.png"
                alt="">
            <h1>read more</h1>
            <p>Lorem ipsum dolor sit, amet consectetur adipisicing elit. Alias non voluptatem fuga quos aliquam
                accusantium perferendis vel minus dolorum voluptas?</p>
            <button>view demo</button>
        </div>

    </div>

</body>

</html>
