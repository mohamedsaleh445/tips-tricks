<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>text-glow</title>

</head>
<style>
    body {
        background: #000;
    }

    h1,
    h2 {
        font-size: 8rem;
        font-family: sans-serif;
        text-transform: capitalize;
        color: white;
    }

    h2 {
        text-shadow:
            0 0 10px #00ffea,
            0 0 25px #00ffea,
            0 0 50px #7b00ff,
            0 0 80px #ff00ff;
    }
</style>

<body>
    <h1>this it not glowing</h1>

    <h2>this text is glowing</h2>
</body>

</html>
