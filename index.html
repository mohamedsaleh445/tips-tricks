    <title>MK tips and tricks</title>

<style>
    body {
        background: #000;
        text-align: center;
        color: white;
        text-transform: capitalize;
    }

    section {
        margin: 0 auto;
        position: relative;
        width: 85%;

    }

    h2 {
        font-size: 3rem;
        text-decoration: underline;
    }

    .main {
        position: absolute;
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
        margin: 0 auto;
        left: 10px;
    }

    .card {
        border: 2px solid white;
        box-shadow: 3px 3px 10px white;
        width: 300px;
        height: 300px;
        border-radius: 15px;
        transition: all .5s ease;
    }

    .card img {
        width: 100%;
        height: 50%;
        background-size: cover;
    }

    .card h2 {
        font-size: 2rem;
    }

    .card a {
        background-color: blue;
        padding: 10px 20px;
        color: white;
        text-decoration: none;
        border-radius: 20px;
        transition: all .5s linear;
    }

    .card:hover {
        box-shadow: 3px 3px 20px white;
        transform: scale(1.03);
    }

    .card a:hover {
        background-color: white;
        color: blue;
    }
</style>

    <section>
        <h2>here you can find all my work </h2>
