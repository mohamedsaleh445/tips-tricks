<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>justify-content</title>
</head>
<style>
    body {
        background: #000;
        height: 100vh;
        text-align: center;
        text-transform: capitalize;
    }


    h1 {
        font-size: 3rem;
        color: white;
    }

    div {
        margin: 20px;
        height: 100px;
        width: 450px;
        border: 5px solid saddlebrown;
        display: flex;
        align-items: center;
        font-size: 30px;
    }

    div:first-child {
        justify-content: center;
    }

    div:nth-child(2) {
        justify-content: space-between;
    }

    div:nth-child(3) {
        justify-content: end;
    }

    div:nth-child(4) {
        justify-content: space-around;
    }

    div:nth-child(5) {
        justify-content: space-evenly;
    }

    div:nth-child(6) {
        justify-content: start;
    }
</style>

<body>
    <h1>justify-content</h1>
    <section>

        <div><span>😎</span><span>😎</span><span>😎</span></div>
        <div><span>😎</span><span>😎</span><span>😎</span></div>
        <div><span>😎</span><span>😎</span><span>😎</span></div>
        <div><span>😎</span><span>😎</span><span>😎</span></div>
        <div><span>😎</span><span>😎</span><span>😎</span></div>
        <div><span>😎</span><span>😎</span><span>😎</span></div>

    </section>

</body>

</html>
