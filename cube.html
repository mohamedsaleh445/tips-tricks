<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكعب 3D بـ CSS فقط</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f172a;
            perspective: 1200px;
            overflow: hidden;
        }

        .scene {
            width: 300px;
            height: 300px;
            perspective: 1200px;
        }

        .cube {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 2.2s ease;
            transform: rotateX(-25deg) rotateY(-35deg);
        }

        .scene:hover .cube {
            transform: rotateX(25deg) rotateY(325deg);
        }

        .face {
            position: absolute;
            width: 300px;
            height: 300px;
            border: 3px solid #1e40af;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            color: white;
            backface-visibility: hidden;
            /* عشان ما يبانش الوجه من الخلف */
            box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.4);
        }

        /* تعريف كل وجه من المكعب */
        .front {
            background: #3b82f6;
            transform: rotateY(0deg) translateZ(150px);
        }

        .back {
            background: #1e40af;
            transform: rotateY(180deg) translateZ(150px);
        }

        .right {
            background: #60a5fa;
            transform: rotateY(90deg) translateZ(150px);
        }

        .left {
            background: #1e3a8a;
            transform: rotateY(-90deg) translateZ(150px);
        }

        .top {
            background: #93c5fd;
            transform: rotateX(90deg) translateZ(150px);
        }

        .bottom {
            background: #1e40af;
            transform: rotateX(-90deg) translateZ(150px);
        }

        /* نص على كل وجه */
        .face span {
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.6);
        }
    </style>
</head>

<body>

    <div class="scene">
        <div class="cube">
            <div class="face front"><span>الأمام</span></div>
            <div class="face back"><span>الخلف</span></div>
            <div class="face right"><span>اليمين</span></div>
            <div class="face left"><span>اليسار</span></div>
            <div class="face top"><span>الأعلى</span></div>
            <div class="face bottom"><span>الأسفل</span></div>
        </div>
    </div>

</body>

</html>
