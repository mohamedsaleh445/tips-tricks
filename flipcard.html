<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Flip on Hover</title>
    <style>
        body {
            background-color: #005df3;
        }

        .flip-card {
            width: 320px;
            height: 400px;
            margin: 40px auto;
            perspective: 500px;
        }

        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            text-transform: capitalize;
            transition: transform 0.8s;
            transform-style: preserve-3d;
            border-radius: 20px;
        }



        .flip-card-front,
        .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 20px;
            backface-visibility: hidden;
        }


        .flip-card-front {
            background-color: #1e3b8a68;
        }

        .flip-card-back {
            background-color: #1f2937;
            color: white;
            transform: rotateY(180deg);
        }

        .flip-card img {
            width: 100%;
            height: 100%;
            border-radius: 20px;

        }

        h2 {
            padding-top: 50px;
        }


        button {
            margin-top: 20px;
            padding: 10px 20px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .flip-card:hover .flip-card-inner {
            transform: rotateY(180deg);
        }
    </style>
</head>

<body>

    <div class="flip-card">
        <div class="flip-card-inner">

            <!-- الوجه الأمامي (Front) -->
            <div class="flip-card-front">
                <img src="https://m.media-amazon.com/images/S/pv-target-images/48448d3f65992c3c9da909933f7fa659efe20d88becd4b62459bc62e0da1889a.jpg"
                    alt="صورة">

            </div>

            <!-- الوجه الخلفي (Back) -->
            <div class="flip-card-back">
                <h2>about</h2>
                <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Debitis tenetur magnam temporibus, id ipsa
                    nihil voluptate natus inventore adipisci ad.</p>
                <button> read more</button>
            </div>

        </div>
    </div>

</body>

</html>
