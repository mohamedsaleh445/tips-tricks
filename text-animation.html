<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>text animation</title>
</head>
<style>
    body {
        color: white;
        background-color: #000000e5;
        height: 100vh;
        text-transform: capitalize;
        font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        font-size: 3rem;
        position: relative;
        margin: auto 30px;
        text-align: center;

    }

    .h1 span {
        letter-spacing: 8px;
        position: relative;
        display: inline-block;
        text-shadow: 5px 15px 50px #1500ff;

        animation: bounce .9s ease infinite;


    }

    .h1 span:first-child {
        animation-delay: .1s;
    }

    .h1 span:nth-child(1) {
        animation-delay: .2s;
    }

    .h1 span:nth-child(2) {
        animation-delay: .3s;
    }

    .h1 span:nth-child(3) {
        animation-delay: .4s;
    }

    .h1 span:nth-child(4) {
        animation-delay: .5s;
    }

    .h1 span:nth-child(5) {
        animation-delay: .6s;
    }

    @keyframes bounce {
        0% {
            top: 0px;
            text-shadow: 10px 5px 30px #00aaff;

        }

        50% {
            top: -50px;
            text-shadow: 15px 5px 10px #f6ff00;

        }

        100% {
            top: 0px;
            text-shadow: 10px 5px 30px #c800ff;


        }
    }

    .h2 {
        text-align: start;
        width: 100%;
        font-size: 2rem;
        white-space: nowrap;
        overflow: hidden;
        animation: writing 2s infinite alternate-reverse;
    }

    @keyframes writing {
        from {
            width: 0px;
        }
    }

    .shine {
        background: linear-gradient(90deg, #1e293b, #fff, #1e293b);
        background-clip: text;
        color: transparent;
        animation: shine 3s infinite ease-in-out;
    }

    @keyframes shine {
        0% {
            background-size: 50%;

        }

        50% {
            background-size: 200%;
        }

        100% {
            background-size: 50%;
        }
    }

    .spaceing {
        animation: spacing 3s infinite linear;
        letter-spacing: 20px;
    }

    @keyframes spacing {
        0% {
            letter-spacing: 20px;
        }

        50% {
            letter-spacing: 50px;
        }

        100% {
            letter-spacing: 20px;
        }
    }

    .blur {
        animation: blur 3s infinite alternate;
    }

    @keyframes blur {
        from {
            filter: blur(10px);
            opacity: 0;
        }

        to {
            filter: blur(0);
            opacity: 1;
        }

    }
</style>

<body>

</body>

<h1 class="h1">
    <span>h</span><span>e</span><span>l</span><span>l</span><span>o</span>
</h1>
<h2 class="h2">welcome to our tips & trick|</h2>

<h2 class="shine">this is shine text</h2>

<h2 class="spaceing">letter spacing</h2>
<h2 class="blur">letter focus</h2>



</html>
